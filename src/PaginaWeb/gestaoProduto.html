    <script>

        let token = ''

        if (!localStorage.getItem('token')) {
            window.location.href = "./login.html"
        }

        token = localStorage.getItem('token');

        // Comando que retorna o ID do usuário através do jwtToken
        const idUsuario = JSON.parse(atob(token.split('.')[1])).nameid
        const perfil = JSON.parse(atob(token.split('.')[1])).role

        if (perfil != 'Administrador') {
            window.location.href = "./index.html"
        }

        // Menu controller
        let lista = document.getElementById('contairner-lista')
        let menu = document.getElementById('button-menu')

        menu.addEventListener('click', () => {
            if (lista.style.cssText == 'display: flex;') {
                lista.style = 'display: none;'
            } else {
                lista.style = 'display: flex;'
            }
        })

        const formatador = new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL',
        })

        document.getElementById('sair').addEventListener('click', () => {
            localStorage.clear()
            window.location.href = "./login.html"
        })

        const container = document.getElementById('container-funcionario')

        async function CarregarProdutos() {

            try {
                const resposta = await fetch('https://localhost:7137/api/Estoque')

                console.log(resposta)

                if (!resposta.ok) {
                    throw new Error(`Erro na requisição: ${resposta.status}`)
                }

                dados = await resposta.json()

                console.log("Dados recebidos com sucesso:", dados)

                let card = ""

                dados.forEach(p => {

                    let ativo = {}
                    if (p.ativo) {
                        ativo = {
                            classe: 'usuario-ativo',
                            texto: 'V'
                        }
                    } else {
                        ativo = {
                            classe: 'usuario-inativo',
                            texto: 'X'
                        }
                    }

                    card +=
                        `
                    <div class="card-produto">
                        <img src="./img/jogos/${p.imagem}" alt="" class="card-img">
                        <div class="container-input">
                            <h5>Nome: </h5>
                            <input type="text" class="input-card-admin" name="nome" id="nome" value="${p.nome}">
                        </div>
                        <div class="container-input-descricao" style="flex-direction: column;">
                            <h5>Descrição: </h5>
                            <textarea class="input-card-admin-descricao" name="descricao" id="descricao">${p.descricao}</textarea>
                        </div>
                        <div class="container-input">
                            <h5>Preço: </h5>
                            <input type="text" class="input-card-admin" name="preco" id="preco" value="${p.preco}">
                        </div>
                        <div class="container-input">
                            <h5>Estoque: </h5>
                            <input type="text" class="input-card-admin" name="estoque" id="estoque" value="${p.quantEstoque}">
                        </div>
                        <div class="container-input">
                            <h5>Usuário ativo: </h5>
                            <button class="${ativo.classe} botao-ativar" value="${p.id}"><b>${ativo.texto}</b></button>
                        </div>
                        <div class="container-input-botao">
                            <button class="botao-salvar" value="${p.id}">Salvar alterações</button>
                        </div>
                    </div>
                    `
                })

                container.innerHTML = card

            } catch (erro) {
                console.error("Houve um problema com a consulta:", erro)
            }
        }

        CarregarProdutos()

        const adicionar = document.getElementById('adicionar-funcionario')

        adicionar.addEventListener('click', () => {

            let card = ''

            card =
                `
                    <div class="card-produto">
                        <img src="./img/jogos/semImagem.png" alt="" class="card-img">
                        <div class="container-input">
                            <h5>Nome: </h5>
                            <input type="text" class="input-card-admin" name="nome" id="nome">
                        </div>
                        <div class="container-input-descricao" style="flex-direction: column;">
                            <h5>Descrição: </h5>
                            <textarea class="input-card-admin-descricao" name="descricao" id="descricao"></textarea>
                        </div>
                        <div class="container-input">
                            <h5>Preço: </h5>
                            <input type="text" class="input-card-admin" name="preco" id="preco">
                        </div>
                        <div class="container-input">
                            <h5>Estoque: </h5>
                            <input type="text" class="input-card-admin" name="estoque" id="estoque">
                        </div>
                        <div class="container-input">
                            <h5>Usuário ativo: </h5>
                            <button class="usuario-ativo excluir"><b>V</b></button>
                        </div>
                        <div class="container-input-botao">
                            <button class="botao-criar">Criar produto</button>
                        </div>
                    </div>
                    `

            container.innerHTML = card + container.innerHTML
        })

        // Botão de ação de criar produto:
        // É criado de forma diferente dos outros pois ele não existe até clçicar no botão de adicionar, nesse caso o addEventeListner não funciona do mesmo jeito

        document.addEventListener('click', async (event) => {
            let botao = event.target.closest('.botao-criar')

            if (botao) {
                const imagem = botao.closest('.card-produto').children[0].src.split('/').pop()
                const nome = botao.closest('.card-produto').children[1].children[1].value
                const descricao = botao.closest('.card-produto').children[2].children[1].value
                const preco = botao.closest('.card-produto').children[3].children[1].value
                const estoque = botao.closest('.card-produto').children[4].children[1].value

                try {
                    const resposta = await fetch('https://localhost:7137/api/Estoque', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        },
                        body: JSON.stringify({
                            "nome": nome,
                            "descricao": descricao,
                            "preco": preco,
                            "quantEstoque": estoque,
                            "imagem": imagem
                        }) // Converte objeto para texto
                    });

                    console.log(resposta)

                    if (resposta.ok) {
                        CarregarProdutos()
                    } else {
                        alert(await resposta.text())
                    }
                } catch (e) {
                    alert("Falha ao cadastrar usuário: " + e)
                }
            }
        })

        // Botão de ação de excluir card de adicionar produto:
        document.addEventListener('click', (event) => {
            let botao = event.target.closest('.excluir')

            if (botao) {
                botao.closest('.card-produto').remove()
            }
        })

        // Botão de ação de ativar e desativar:
        document.addEventListener('click', async (event) => {
            let botao = event.target.closest('.botao-ativar')

            if (botao) {

                try {
                    const resposta = await fetch('https://localhost:7137/api/Estoque/' + botao.value, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        }
                    });

                    console.log(resposta)

                    if (resposta.ok) {
                        CarregarProdutos()
                    } else {
                        alert(await resposta.text())
                    }
                } catch (e) {
                    alert("Falha ao cadastrar usuário: " + e)
                }
            }
        })

        // Botão de ação de criar usuário:
        document.addEventListener('click', async (event) => {
            let botao = event.target.closest('.botao-salvar')

            if (botao) {
                const imagem = botao.closest('.card-produto').children[0].src.split('/').pop()
                const nome = botao.closest('.card-produto').children[1].children[1].value
                const descricao = botao.closest('.card-produto').children[2].children[1].value
                const preco = botao.closest('.card-produto').children[3].children[1].value
                const estoque = botao.closest('.card-produto').children[4].children[1].value

                try {
                    const resposta = await fetch('https://localhost:7137/api/Estoque/' + botao.value, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        },
                        body: JSON.stringify({
                            "nome": nome,
                            "descricao": descricao,
                            "preco": preco,
                            "quantEstoque": estoque,
                            "imagem": imagem
                        }) // Converte objeto para texto
                    });

                    console.log(resposta)

                    if (resposta.ok) {
                        CarregarProdutos()
                    } else {
                        alert(await resposta.text())
                    }
                } catch (e) {
                    alert("Falha ao cadastrar usuário: " + e)
                }
            }
        })

    </script>
