<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <header class="container-fluid header-index-ajuste">
    <div class="row align-items-center py-2">
      <div class="col-3 col-md-3" id="container-logo">
        <img src="./img/LogoGameStore.png" alt="Logo" id="logo">
      </div>
      <div class="col-6 col-md-6" id="container-procura">
        <input type="text" name="procura" id="procura">
        <button id="lupa"><img src="./img/Icons/lupa.png" alt="" width="100%" height="100%"></button>
      </div>
      <div class="col-3 col-md-3" id="container-menu">
        <button id="button-menu"><img src="./img/Icons/menu.png" alt="Menu" width="100%" height="100%"></button>
      </div>
    </div>
  </header>

  <nav id="contairner-lista" style="display: none;">
    <a href="./index.html"><b><h3>Home</h3></b></a>
    <a href="./perfil.html"><b><h3>Perfil</h3></b></a>
    <a href="./carrinho.html"><b><h3>Carrinho</h3></b></a>
    <a href="./login.html"><b><h3>Login e Cadastro</h3></b></a>
    <a href="#"><b><h3 id="sair">Sair</h3></b></a>
  </nav>

  <main class="layout-principal container-fluid d-flex justify-content-center align-items-center py-5" id="container-perfil-ajuste">
    <div class="box">
      <h3>Meu Perfil</h3>

      <label for="usuario">Usuário:</label>
      <input type="text" name="usuario" id="usuario">

      <label for="email">Email:</label>
      <input type="text" name="email" id="email">

      <label for="senha">Nova Senha:</label>
      <input type="password" name="senha" id="senha" placeholder="Digite para alterar">

      <div class="buttons container-botoes-perfil">
        <button type="button" class="alert btn-desativar-ajuste" id="desativar">Desativar usuário</button>
        <button type="button" class="botao-cadastro" id="salvar">Salvar</button>
      </div>
    </div>
  </main>

  <footer class="container-fluid">
    <div class="row py-3 gy-3">
      <div class="col-12 col-md-4 sessao-footer">
        <h3><b>Contatos:</b></h3>
        <div id="container-contatos">
          <div class="linha my-1">
            <img src="./img/Icons/linkedin.png" alt="">&nbsp;<h5>GameStore</h5>&nbsp;&nbsp;
            <img src="./img/Icons/whatsapp.png" alt="">&nbsp;<h5>(31) 9 1234 - 5678</h5>
          </div>
          <div class="linha my-1">
            <img src="./img/Icons/gmail.png" alt="">&nbsp;<h5>gamestore@gmail.com</h5>&nbsp;&nbsp;
            <img src="./img/Icons/instagram.png" alt="">&nbsp;<h5>GameStore</h5>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4 sessao-footer">
        <h3><b>Sessões:</b></h3>
        <h5><a href="./index.html">Home</a></h5>
        <h5><a href="./login.html">Login e Cadastro</a></h5>
        <h5><a href="./gestaoProduto.html">Gestão de Produto</a></h5>
        <h5><a href="./gestaoFuncionario.html">Funcionários</a></h5>
      </div>
      <div class="col-12 col-md-4 sessao-footer">
        <h3><b>Mais informações:</b></h3>
        <div id="container-sessoes">
          <h5>CNPJ: 35.159.816/0001-47</h5>
          <h5>Endereço: 79320-210</h5>
        </div>
      </div>
    </div>
  </footer>

  <script>
    let token = ''

    if(!localStorage.getItem('token')){
      window.location.href = "./login.html"
    }

    token = localStorage.getItem('token');

    const idUsuario = JSON.parse(atob(token.split('.')[1])).nameid

    // Menu controller
    let lista = document.getElementById('contairner-lista')
    let menu = document.getElementById('button-menu')

    menu.addEventListener('click', () => {
      if (lista.style.display === 'flex') {
        lista.style.display = 'none';
      } else {
        lista.style.display = 'flex';
      }
    })

    document.getElementById('sair').addEventListener('click', () => {
      localStorage.clear()
      window.location.href = "./login.html"
    })

    const formatador = new Intl.NumberFormat('pt-BR', {
      style: 'currency',
      currency: 'BRL',
    });

    const usuario = document.getElementById('usuario')
    const email = document.getElementById('email')
    const senha = document.getElementById('senha')

    async function carregaUsuario() {
      try {
        const resposta = await fetch('https://satchel-carry-yard.ngrok-free.dev/api/Usuarios/' + idUsuario, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
        })

        const dados = await resposta.json()

        if (resposta.status == 200) {
          usuario.value = dados.nome
          email.value = dados.email
        } else {
          alert("Falha ao carregar usuário")
        }

      } catch (e) {
        alert('Falha ao carregar usuário: ' + e)
      }
    }

    const desativar = document.getElementById('desativar')

    desativar.addEventListener('click', async () => {
      if(!confirm("Tem certeza que deseja desativar sua conta? Esta ação não pode ser desfeita.")) return;
      
      try {
        const resposta = await fetch('https://satchel-carry-yard.ngrok-free.dev/api/Usuarios/' + idUsuario, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'
          }
        })

        if (resposta.status == 204) {
          alert('Usuário desativado com sucesso')
          localStorage.clear()
          window.location.href = "./login.html"
        } else {
          alert(await resposta.text())
        }

      } catch (e) {
        alert('Falha ao remover usuário: ' + e)
      }
    })

    const salvar = document.getElementById('salvar')

    salvar.addEventListener('click', async () => {
      const usuarioValor = document.getElementById('usuario').value
      const emailValor = document.getElementById('email').value
      const senhaValor = document.getElementById('senha').value

      if (usuarioValor == '' || emailValor == '') {
        alert('Usuário e email devem estar preenchidos')
        return ''
      }

      try {
        const resposta = await fetch('https://satchel-carry-yard.ngrok-free.dev/api/Usuarios/' + idUsuario, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true'
          },
          body: JSON.stringify({
            "nome": usuarioValor,
            "email": emailValor,
            "password": senhaValor,
            "perfil": 1
          })
        })

        if (resposta.status == 204) {
          alert('Usuário atualizado com sucesso')
        } else {
          alert(await resposta.text())
        }

      } catch (e) {
        alert('Falha ao atualizar usuário: ' + e)
      }
    })

    carregaUsuario()
  </script>
</body>
</html>
